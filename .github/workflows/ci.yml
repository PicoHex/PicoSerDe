name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 10.0.x
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - logical-target: win-x64
            runs-on: windows-latest
          - logical-target: win-arm64
            runs-on: windows-latest
          - logical-target: linux-x64
            runs-on: ubuntu-latest
          - logical-target: linux-arm64
            runs-on: ubuntu-latest
          - logical-target: osx-arm64
            runs-on: macos-latest
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Show logical target
        run: echo "Testing ${{ matrix.logical-target }}"
      - run: dotnet restore -p:UseProjectReferences=true
      - run: dotnet build --configuration Release --no-restore -p:UseProjectReferences=true
      - run: dotnet test --configuration Release --no-build --verbosity normal
      - run: dotnet build PicoJson/benchmarks/PicoJson.Benchmarks/PicoJson.Benchmarks.csproj -c Release --no-restore
      - run: dotnet build PicoIni/benchmarks/PicoIni.Benchmarks/PicoIni.Benchmarks.csproj -c Release --no-restore
      - run: dotnet build PicoToml/benchmarks/PicoToml.Benchmarks/PicoToml.Benchmarks.csproj -c Release --no-restore
      - run: dotnet build PicoYaml/benchmarks/PicoYaml.Benchmarks/PicoYaml.Benchmarks.csproj -c Release --no-restore
      - run: dotnet build PicoMsgPack/benchmarks/PicoMsgPack.Benchmarks/PicoMsgPack.Benchmarks.csproj -c Release --no-restore
      - name: Run PicoJson benchmarks (smoke)
        run: dotnet run --project PicoJson/benchmarks/PicoJson.Benchmarks -c Release --no-build -- --filter '*' --iterationCount 1 --warmupCount 0
      - name: Run PicoIni benchmarks (smoke)
        run: dotnet run --project PicoIni/benchmarks/PicoIni.Benchmarks -c Release --no-build -- --filter '*' --iterationCount 1 --warmupCount 0
      - name: Run PicoToml benchmarks (smoke)
        run: dotnet run --project PicoToml/benchmarks/PicoToml.Benchmarks -c Release --no-build -- --filter '*' --iterationCount 1 --warmupCount 0
      - name: Run PicoYaml benchmarks (smoke)
        run: dotnet run --project PicoYaml/benchmarks/PicoYaml.Benchmarks -c Release --no-build -- --filter '*' --iterationCount 1 --warmupCount 0
      - name: Run PicoMsgPack benchmarks (smoke)
        run: dotnet run --project PicoMsgPack/benchmarks/PicoMsgPack.Benchmarks -c Release --no-build -- --filter '*' --iterationCount 1 --warmupCount 0

  aot-validation:
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - logical-target: win-x64
            runs-on: windows-latest
            rid: win-x64
          - logical-target: win-arm64
            runs-on: windows-latest
            rid: win-arm64
          - logical-target: linux-x64
            runs-on: ubuntu-latest
            rid: linux-x64
          - logical-target: linux-arm64
            runs-on: ubuntu-latest
            rid: linux-arm64
          - logical-target: osx-arm64
            runs-on: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      # RID publish validation: x64 Linux hosts need arm64 cross-compilation toolchain
      - name: Install Linux AOT prerequisites (x64)
        if: startsWith(matrix.rid, 'linux-x64')
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev
      - name: Install Linux AOT prerequisites (arm64 cross)
        if: matrix.rid == 'linux-arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's|http://security.ubuntu.com|http://ports.ubuntu.com|g' /etc/apt/sources.list /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          sudo sed -i 's|http://archive.ubuntu.com|http://ports.ubuntu.com|g' /etc/apt/sources.list /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev binutils-aarch64-linux-gnu
      - run: dotnet publish PicoJson/samples/PicoJson.Sample/PicoJson.Sample.csproj -c Release -f net10.0 -r ${{ matrix.rid }} --self-contained
      - run: dotnet publish PicoIni/samples/PicoIni.Sample/PicoIni.Sample.csproj -c Release -f net10.0 -r ${{ matrix.rid }} --self-contained
      - run: dotnet publish PicoToml/samples/PicoToml.Sample/PicoToml.Sample.csproj -c Release -f net10.0 -r ${{ matrix.rid }} --self-contained
      - run: dotnet publish PicoYaml/samples/PicoYaml.Sample/PicoYaml.Sample.csproj -c Release -f net10.0 -r ${{ matrix.rid }} --self-contained
      - run: dotnet publish PicoMsgPack/samples/PicoMsgPack.Sample/PicoMsgPack.Sample.csproj -c Release -f net10.0 -r ${{ matrix.rid }} --self-contained
