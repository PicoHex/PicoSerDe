name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: 10.0.x
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      # Tier 2 pack order: Abstractions → Generator → Consumer
      - shell: bash
        run: |
          rm -rf ${{ github.workspace }}/artifacts/nupkg
          mkdir -p ${{ github.workspace }}/artifacts/nupkg

          dotnet pack PicoSerDe.Core/src/PicoSerDe.Core.csproj \
            --configuration Release \
            --output ${{ github.workspace }}/artifacts/nupkg \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:UseProjectReferences=false

          dotnet pack PicoJetson/src/PicoJetson.Gen/PicoJetson.Gen.csproj \
            --configuration Release \
            --output ${{ github.workspace }}/artifacts/nupkg \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources=${{ github.workspace }}/artifacts/nupkg

          dotnet pack PicoJetson/src/PicoJetson/PicoJetson.csproj \
            --configuration Release \
            --output ${{ github.workspace }}/artifacts/nupkg \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:UseProjectReferences=false \
            -p:RestoreSources=${{ github.workspace }}/artifacts/nupkg

          dotnet pack PicoIni/src/PicoIni.Gen/PicoIni.Gen.csproj \
            --configuration Release \
            --output ${{ github.workspace }}/artifacts/nupkg \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources=${{ github.workspace }}/artifacts/nupkg

          dotnet pack PicoIni/src/PicoIni/PicoIni.csproj \
            --configuration Release \
            --output ${{ github.workspace }}/artifacts/nupkg \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:UseProjectReferences=false \
            -p:RestoreSources=${{ github.workspace }}/artifacts/nupkg

          dotnet pack PicoToml/src/PicoToml.Gen/PicoToml.Gen.csproj \
            --configuration Release \
            --output ${{ github.workspace }}/artifacts/nupkg \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources=${{ github.workspace }}/artifacts/nupkg

          dotnet pack PicoToml/src/PicoToml/PicoToml.csproj \
            --configuration Release \
            --output ${{ github.workspace }}/artifacts/nupkg \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:UseProjectReferences=false \
            -p:RestoreSources=${{ github.workspace }}/artifacts/nupkg

          dotnet pack PicoYaml/src/PicoYaml.Gen/PicoYaml.Gen.csproj \
            --configuration Release \
            --output ${{ github.workspace }}/artifacts/nupkg \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources=${{ github.workspace }}/artifacts/nupkg

          dotnet pack PicoYaml/src/PicoYaml/PicoYaml.csproj \
            --configuration Release \
            --output ${{ github.workspace }}/artifacts/nupkg \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:UseProjectReferences=false \
            -p:RestoreSources=${{ github.workspace }}/artifacts/nupkg

          dotnet pack PicoMsgPack/src/PicoMsgPack.Gen/PicoMsgPack.Gen.csproj \
            --configuration Release \
            --output ${{ github.workspace }}/artifacts/nupkg \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources=${{ github.workspace }}/artifacts/nupkg

          dotnet pack PicoMsgPack/src/PicoMsgPack/PicoMsgPack.csproj \
            --configuration Release \
            --output ${{ github.workspace }}/artifacts/nupkg \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:UseProjectReferences=false \
            -p:RestoreSources=${{ github.workspace }}/artifacts/nupkg

      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            ${{ github.workspace }}/artifacts/nupkg/*.nupkg
            ${{ github.workspace }}/artifacts/nupkg/*.snupkg

  publish:
    runs-on: ubuntu-latest
    needs: pack
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nupkg
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - shell: bash
        run: |
          for file in *.nupkg; do
            if [[ "$file" != *.snupkg ]] && [[ "$file" != *.symbols.nupkg ]]; then
              dotnet nuget push "$file" \
                --api-key "${{ secrets.NUGET_API_KEY }}" \
                --source https://api.nuget.org/v3/index.json \
                --skip-duplicate
            fi
          done
